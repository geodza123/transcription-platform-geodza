<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Квант и Платрум - AI-платформа обучения</title>
    <style>
:root {
  --bg: #f4f6f2;
  --surface: #ffffff;
  --surface-strong: #eef4eb;
  --ink: #1f251f;
  --muted: #667064;
  --line: #d8ded5;
  --green: #287a52;
  --green-dark: #18583a;
  --coral: #c85c4a;
  --amber: #b98222;
  --shadow: 0 16px 48px rgba(31, 37, 31, 0.12);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 15px;
  letter-spacing: 0;
}

button,
input,
textarea {
  font: inherit;
}

.shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: minmax(320px, 390px) minmax(0, 1fr);
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 18px;
  border-right: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.78);
  backdrop-filter: blur(16px);
}

.brand {
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 12px;
  align-items: center;
}

.brand-mark {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  background: var(--ink);
  color: white;
  font-weight: 800;
}

.brand h1 {
  margin: 0;
  font-size: 20px;
  line-height: 1.15;
}

.brand p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.system-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.system-tab,
.compact-button,
.primary-button,
.action-link,
.phase-button {
  min-height: 38px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink);
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  white-space: nowrap;
}

.system-tab.is-active,
.phase-button.is-active,
.primary-button {
  border-color: var(--green);
  background: var(--green);
  color: white;
}

.compact-button.is-complete {
  border-color: var(--green);
  color: var(--green-dark);
  background: var(--surface-strong);
}

.search,
.segment-search {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
}

.search input,
.segment-search input,
.comment-editor textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--ink);
  outline: none;
}

.search input,
.segment-search input {
  height: 42px;
  padding: 0 12px;
}

.comment-editor textarea {
  resize: vertical;
  padding: 12px;
  min-height: 96px;
}

.phase-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.phase-button {
  min-height: 34px;
  font-size: 13px;
}

.lesson-list {
  overflow: auto;
  display: grid;
  gap: 8px;
  padding-right: 2px;
}

.lesson-row {
  width: 100%;
  display: grid;
  grid-template-columns: 38px 1fr auto;
  gap: 10px;
  align-items: start;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--ink);
  text-align: left;
  padding: 10px;
  cursor: pointer;
}

.lesson-row.is-active {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(40, 122, 82, 0.12);
}

.lesson-row.is-complete .lesson-number {
  background: var(--green);
  color: white;
}

.lesson-number {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  background: var(--surface-strong);
  font-weight: 700;
  font-size: 13px;
}

.lesson-row-title {
  display: block;
  font-weight: 700;
  line-height: 1.25;
}

.lesson-row-meta {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-top: 4px;
}

.lesson-status {
  font-size: 12px;
  color: var(--amber);
}

.workspace {
  min-width: 0;
  padding: 20px;
  display: grid;
  gap: 18px;
  align-content: start;
}

.player-band,
.lesson-panel,
.transcript-panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.player-band {
  padding: 16px;
}

.lesson-heading {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.kicker {
  margin: 0 0 6px;
  color: var(--green);
  font-weight: 700;
}

.lesson-heading h2 {
  margin: 0;
  font-size: 24px;
  line-height: 1.2;
}

.lesson-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.action-link[aria-disabled="true"] {
  pointer-events: none;
  opacity: 0.42;
}

.video-frame {
  position: relative;
  background: #111611;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 16 / 9;
}

.video-frame video,
.youtube-frame iframe {
  width: 100%;
  height: 100%;
  display: block;
  border: 0;
}

.empty-state {
  min-height: 100%;
  display: grid;
  place-items: center;
  color: white;
  padding: 24px;
  text-align: center;
}

.content-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
  gap: 18px;
}

.lesson-panel,
.transcript-panel {
  padding: 16px;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.panel-header h3,
.ai-box h3 {
  margin: 0;
  font-size: 16px;
}

.lesson-panel p {
  margin: 0;
  line-height: 1.55;
}

.ai-box {
  margin-top: 16px;
  border-top: 1px solid var(--line);
  padding-top: 14px;
}

.ai-box p {
  margin-top: 8px;
}

.counter {
  min-width: 28px;
  height: 28px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  background: var(--surface-strong);
  color: var(--green-dark);
  font-weight: 700;
}

.comment-editor {
  display: grid;
  gap: 10px;
}

.comments-list {
  display: grid;
  gap: 10px;
  margin-top: 12px;
}

.comment-item {
  border-left: 3px solid var(--coral);
  padding: 8px 10px;
  background: #fff8f6;
  border-radius: 6px;
}

.comment-item time {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 4px;
}

.transcript-panel {
  box-shadow: none;
}

.transcript-segments {
  display: grid;
  gap: 8px;
  max-height: 520px;
  overflow: auto;
  padding-right: 4px;
}

.segment {
  display: grid;
  grid-template-columns: 96px minmax(0, 1fr);
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}

.segment button {
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
  color: var(--green-dark);
  cursor: pointer;
}

.segment p {
  margin: 0;
  line-height: 1.5;
}

.hidden {
  display: none !important;
}

@media (max-width: 960px) {
  .shell {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    height: auto;
    max-height: none;
  }

  .lesson-list {
    max-height: 420px;
  }

  .content-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 620px) {
  .workspace,
  .sidebar {
    padding: 12px;
  }

  .lesson-heading {
    display: grid;
  }

  .lesson-heading h2 {
    font-size: 20px;
  }

  .lesson-actions {
    justify-content: flex-start;
  }

  .segment {
    grid-template-columns: 1fr;
  }
}

</style>

    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>

          <article class="lesson-panel">

              <h3>Комментарии</h3>
              <span id="commentCount" class="counter">0</span>

              <button id="saveComment" class="primary-button" type="button">Сохранить</button>
            </div>
            <div id="commentsList" class="comments-list"></div>
          </article>
        </section>

        <section class="transcript-panel">
          <div class="panel-header">
            <h3>Транскрипт</h3>
            <label class="segment-search">
              <span>Внутри урока</span>
              <input id="segmentSearch" type="search" placeholder="Найти в тексте">
            </label>
          </div>
          <div id="transcriptSegments" class="transcript-segments"></div>
        </section>
      </main>

сти и выгоды."}],"platrum":{"linksFile":"Ссылки из ютуб.md","linksCount":40,"statusText":"Платрум транскрибирован и выстроен по смыслу"},"publicBuild":{"mode":"single-file","note":"Lightweight public build: videos, navigation, descriptions, comments and progress; full transcripts are stored in source project."}}</script>
<script>
const state = {
  data: null,
  system: "Квант",
  phase: "all",
  activeId: null,
  query: "",
  segmentQuery: "",
  videoLoadToken: 0,
  directVideoCache: {},
  progress: JSON.parse(localStorage.getItem("learning-progress") || "{}"),
  comments: JSON.parse(localStorage.getItem("learning-comments") || "{}"),
};

const els = {
  systemTabs: document.querySelectorAll(".system-tab"),
  searchInput: document.querySelector("#searchInput"),
  phaseFilters: document.querySelector("#phaseFilters"),
  lessonList: document.querySelector("#lessonList"),
  lessonKicker: document.querySelector("#lessonKicker"),
  lessonTitle: document.querySelector("#lessonTitle"),
  video: document.querySelector("#videoPlayer"),
  youtubeFrame: document.querySelector("#youtubeFrame"),
  emptyState: document.querySelector("#emptyState"),
  transcriptLink: document.querySelector("#transcriptLink"),
  srtLink: document.querySelector("#srtLink"),
  sourceLink: document.querySelector("#sourceLink"),
  lessonSummary: document.querySelector("#lessonSummary"),
  lessonAi: document.querySelector("#lessonAi"),
  completeButton: document.querySelector("#completeButton"),
  commentInput: document.querySelector("#commentInput"),
  saveComment: document.querySelector("#saveComment"),
  commentsList: document.querySelector("#commentsList"),
  commentCount: document.querySelector("#commentCount"),
  segmentSearch: document.querySelector("#segmentSearch"),
  transcriptSegments: document.querySelector("#transcriptSegments"),
};

function saveProgress() {
  localStorage.setItem("learning-progress", JSON.stringify(state.progress));
}

function saveComments() {
  localStorage.setItem("learning-comments", JSON.stringify(state.comments));
}

function formatDuration(seconds) {
  if (!seconds) return "ожидает";
  const mins = Math.floor(seconds / 60);
  const secs = Math.round(seconds % 60).toString().padStart(2, "0");
  return `${mins}:${secs}`;
}

function formatTime(seconds) {
  const total = Math.floor(seconds || 0);
  const h = Math.floor(total / 3600).toString().padStart(2, "0");
  const m = Math.floor((total % 3600) / 60).toString().padStart(2, "0");
  const s = Math.floor(total % 60).toString().padStart(2, "0");
  return `${h}:${m}:${s}`;
}

function youtubeEmbed(url) {
  const match = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{6,})/);
  return match ? `https://www.youtube.com/embed/${match[1]}` : null;
}

function resolveAssetUrl(url) {
  if (!url) return url;
  if (/^https?:\/\//.test(url)) return url;
  if (location.protocol === "file:" && url.startsWith("/")) return `..${url}`;
  return url;
}

async function resolveYandexPublicVideo(publicUrl) {
  if (!publicUrl) return null;
  if (state.directVideoCache[publicUrl]) return state.directVideoCache[publicUrl];
  const apiUrl = `https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=${encodeURIComponent(publicUrl)}`;
  const response = await fetch(apiUrl);
  if (!response.ok) {
    throw new Error(`Yandex public download failed: ${response.status}`);
  }
  const payload = await response.json();
  if (!payload.href) {
    throw new Error("Yandex public download returned no href");
  }
  state.directVideoCache[publicUrl] = payload.href;
  return payload.href;
}

async function loadExternalVideo(lesson, progress) {
  const token = ++state.videoLoadToken;
  els.youtubeFrame.hidden = true;
  els.video.hidden = true;
  els.video.removeAttribute("src");
  els.video.load();
  els.emptyState.hidden = false;
  els.emptyState.textContent = "Загружаю видео с Яндекс Диска...";
  try {
    const videoUrl = await resolveYandexPublicVideo(lesson.externalVideoUrl || lesson.videoUrl);
    if (token !== state.videoLoadToken || lesson.id !== state.activeId) return;
    els.emptyState.hidden = true;
    els.video.hidden = false;
    els.video.src = videoUrl;
    els.video.currentTime = progress.time || 0;
    els.video.load();
  } catch (error) {
    if (token !== state.videoLoadToken || lesson.id !== state.activeId) return;
    els.video.hidden = true;
    els.emptyState.hidden = false;
    els.emptyState.innerHTML = `<p>Не удалось встроить видео автоматически. Открой его через кнопку <strong>Источник</strong>.</p>`;
    console.error(error);
  }
}

function lessonsForCurrentSystem() {
  const query = state.query.trim().toLowerCase();
  return state.data.lessons.filter((lesson) => {
    if (lesson.system !== state.system) return false;
    if (state.phase !== "all" && String(lesson.phaseId) !== state.phase) return false;
    if (query && !lesson.searchText.includes(query)) return false;
    return true;
  });
}

function setDisabledLink(el, disabled) {
  el.setAttribute("aria-disabled", disabled ? "true" : "false");
  el.tabIndex = disabled ? -1 : 0;
}

function renderPhases() {
  const phases = state.data.phases.filter((phase) => {
    return state.data.lessons.some((lesson) => lesson.system === state.system && lesson.phaseId === phase.id);
  });
  els.phaseFilters.innerHTML = "";
  const all = document.createElement("button");
  all.type = "button";
  all.className = `phase-button ${state.phase === "all" ? "is-active" : ""}`;
  all.textContent = "Все";
  all.addEventListener("click", () => {
    state.phase = "all";
    render();
  });
  els.phaseFilters.append(all);

  phases.forEach((phase) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = `phase-button ${state.phase === String(phase.id) ? "is-active" : ""}`;
    button.textContent = phase.name;
    button.addEventListener("click", () => {
      state.phase = String(phase.id);
      render();
    });
    els.phaseFilters.append(button);
  });
}

function renderLessonList() {
  const lessons = lessonsForCurrentSystem();
  els.lessonList.innerHTML = "";
  if (!lessons.length) {
    const empty = document.createElement("div");
    empty.className = "empty-list";
    empty.textContent = state.system === "Платрум"
      ? state.data.platrum.statusText
      : "Ничего не найдено";
    els.lessonList.append(empty);
    return;
  }
  lessons.forEach((lesson) => {
    const progress = state.progress[lesson.id] || {};
    const row = document.createElement("button");
    row.type = "button";
    row.className = `lesson-row ${lesson.id === state.activeId ? "is-active" : ""} ${progress.complete ? "is-complete" : ""}`;
    row.innerHTML = `
      <span class="lesson-number">${String(lesson.number).padStart(2, "0")}</span>
      <span>
        <span class="lesson-row-title"></span>
        <span class="lesson-row-meta">${lesson.phase} · ${formatDuration(lesson.durationSeconds)}</span>
      </span>
      <span class="lesson-status">${progress.complete ? "готово" : ""}</span>
    `;
    row.querySelector(".lesson-row-title").textContent = lesson.title;
    row.addEventListener("click", () => selectLesson(lesson.id));
    els.lessonList.append(row);
  });
}

function selectLesson(id) {
  state.videoLoadToken += 1;
  state.activeId = id;
  state.segmentQuery = "";
  els.segmentSearch.value = "";
  render();
}

function activeLesson() {
  return state.data.lessons.find((lesson) => lesson.id === state.activeId) || lessonsForCurrentSystem()[0] || null;
}

function renderActiveLesson() {
  const lesson = activeLesson();
  if (!lesson) {
    els.lessonKicker.textContent = state.system;
    els.lessonTitle.textContent = state.system === "Платрум" ? "Ссылки ещё не добавлены" : "Нет уроков";
    els.video.hidden = true;
    els.youtubeFrame.hidden = true;
    els.emptyState.hidden = false;
    els.emptyState.textContent = state.system === "Платрум"
      ? "Добавь YouTube-ссылки в файл, затем пересобери платформу."
      : "Нет данных для отображения.";
    return;
  }
  state.activeId = lesson.id;
  const progress = state.progress[lesson.id] || {};
  els.lessonKicker.textContent = `${lesson.system} · ${lesson.phase} · ${formatDuration(lesson.durationSeconds)}`;
  els.lessonTitle.textContent = `${String(lesson.number).padStart(2, "0")}. ${lesson.title}`;
  els.lessonSummary.textContent = lesson.summary;
  els.lessonAi.textContent = lesson.aiUse;
  els.completeButton.textContent = progress.complete ? "Готово" : "Отметить";
  els.completeButton.classList.toggle("is-complete", Boolean(progress.complete));

  els.transcriptLink.href = resolveAssetUrl(lesson.transcriptUrl) || "#";
  els.srtLink.href = resolveAssetUrl(lesson.srtUrl) || "#";
  const sourceUrl = lesson.youtubeUrl || lesson.externalVideoUrl || lesson.videoUrl;
  els.sourceLink.href = resolveAssetUrl(sourceUrl) || "#";
  setDisabledLink(els.transcriptLink, !lesson.transcriptUrl);
  setDisabledLink(els.srtLink, !lesson.srtUrl);
  setDisabledLink(els.sourceLink, !sourceUrl);

  els.youtubeFrame.innerHTML = "";
  if (lesson.sourceKind === "local-video" && lesson.videoUrl) {
    els.youtubeFrame.hidden = true;
    els.emptyState.hidden = true;
    els.video.hidden = false;
    const videoUrl = resolveAssetUrl(lesson.videoUrl);
    if (!els.video.src.endsWith(videoUrl)) {
      els.video.src = videoUrl;
      els.video.currentTime = progress.time || 0;
    }
  } else if (lesson.youtubeUrl && youtubeEmbed(lesson.youtubeUrl)) {
    els.video.hidden = true;
    els.emptyState.hidden = true;
    els.youtubeFrame.hidden = false;
    els.youtubeFrame.innerHTML = `<iframe src="${youtubeEmbed(lesson.youtubeUrl)}" allowfullscreen loading="lazy"></iframe>`;
  } else if (lesson.externalVideoUrl || lesson.sourceKind === "external-video") {
    els.youtubeFrame.hidden = true;
    loadExternalVideo(lesson, progress);
  } else {
    els.video.hidden = true;
    els.youtubeFrame.hidden = true;
    els.emptyState.hidden = false;
    els.emptyState.textContent = "Видео не встроено в публичную сборку. Используй транскрипт ниже и кнопку Источник, если ссылка есть.";
  }
  renderComments(lesson);
  renderTranscript(lesson);
}

function renderTranscript(lesson) {
  const query = state.segmentQuery.trim().toLowerCase();
  const segments = lesson.segments.filter((segment) => {
    return !query || segment.text.toLowerCase().includes(query);
  });
  els.transcriptSegments.innerHTML = "";
  if (!segments.length) {
    const empty = document.createElement("p");
    empty.textContent = lesson.segments.length ? "Фрагменты не найдены." : "Полная транскрибация хранится в исходном проекте. Смотреть урок можно через плеер выше.";
    els.transcriptSegments.append(empty);
    return;
  }
  segments.forEach((segment) => {
    const item = document.createElement("div");
    item.className = "segment";
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = formatTime(segment.start);
    button.addEventListener("click", () => {
      if (!els.video.hidden) {
        els.video.currentTime = segment.start;
        els.video.play();
      }
    });
    const text = document.createElement("p");
    text.textContent = segment.text;
    item.append(button, text);
    els.transcriptSegments.append(item);
  });
}

function renderComments(lesson) {
  const comments = state.comments[lesson.id] || [];
  els.commentCount.textContent = comments.length;
  els.commentsList.innerHTML = "";
  comments.forEach((comment) => {
    const item = document.createElement("div");
    item.className = "comment-item";
    const time = document.createElement("time");
    time.dateTime = comment.createdAt;
    time.textContent = new Date(comment.createdAt).toLocaleString("ru-RU");
    const text = document.createElement("div");
    text.textContent = comment.text;
    item.append(time, text);
    els.commentsList.append(item);
  });
}

function render() {
  renderPhases();
  renderLessonList();
  renderActiveLesson();
}

els.systemTabs.forEach((tab) => {
  tab.addEventListener("click", () => {
    state.system = tab.dataset.system;
    state.phase = "all";
    state.activeId = null;
    els.systemTabs.forEach((item) => item.classList.toggle("is-active", item === tab));
    render();
  });
});

els.searchInput.addEventListener("input", (event) => {
  state.query = event.target.value;
  state.activeId = null;
  render();
});

els.segmentSearch.addEventListener("input", (event) => {
  state.segmentQuery = event.target.value;
  const lesson = activeLesson();
  if (lesson) renderTranscript(lesson);
});

els.completeButton.addEventListener("click", () => {
  const lesson = activeLesson();
  if (!lesson) return;
  const progress = state.progress[lesson.id] || {};
  progress.complete = !progress.complete;
  state.progress[lesson.id] = progress;
  saveProgress();
  render();
});

els.saveComment.addEventListener("click", () => {
  const lesson = activeLesson();
  const text = els.commentInput.value.trim();
  if (!lesson || !text) return;
  const comments = state.comments[lesson.id] || [];
  comments.unshift({ text, createdAt: new Date().toISOString() });
  state.comments[lesson.id] = comments;
  els.commentInput.value = "";
  saveComments();
  renderComments(lesson);
});

els.video.addEventListener("timeupdate", () => {
  const lesson = activeLesson();
  if (!lesson) return;
  const progress = state.progress[lesson.id] || {};
  progress.time = Math.floor(els.video.currentTime);
  state.progress[lesson.id] = progress;
  saveProgress();
});

els.video.addEventListener("ended", () => {
  const lesson = activeLesson();
  if (!lesson) return;
  const progress = state.progress[lesson.id] || {};
  progress.complete = true;
  state.progress[lesson.id] = progress;
  saveProgress();
  renderLessonList();
});

const embedded = document.querySelector("#embeddedLessons");
const dataPromise = embedded
  ? Promise.resolve(JSON.parse(embedded.textContent))
  : fetch("/platform/data/lessons.json").then((response) => response.json());

dataPromise.then((data) => {
    state.data = data;
    state.activeId = data.lessons.find((lesson) => lesson.system === "Квант")?.id || null;
    render();
  })
  .catch((error) => {
    document.body.innerHTML = `<main class="empty-state">Не удалось загрузить данные платформы: ${error.message}</main>`;
  });

</script>
  </body>
</html>
